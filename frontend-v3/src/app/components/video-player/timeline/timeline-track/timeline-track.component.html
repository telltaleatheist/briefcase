<div class="timeline-track-container">
  <!-- Chapters layer - above waveform -->
  @if (chapters.length > 0) {
    <div class="track-chapters-header">
      <app-timeline-chapters-layer
        [chapters]="chapters"
        [duration]="duration"
        [zoomState]="zoomState"
        [currentTime]="currentTime"
        [selectedChapterId]="selectedChapterId"
        (chapterClick)="onChapterClick($event)"
        (chapterHover)="onChapterHover($event)">
      </app-timeline-chapters-layer>
    </div>
  }

  <!-- Mute sections layer - shows muted audio regions -->
  @if (muteSections.length > 0) {
    <div class="track-mute-header">
      <app-timeline-mute-layer
        [muteSections]="muteSections"
        [duration]="duration"
        [zoomState]="zoomState"
        [selectedSection]="selectedMuteSection"
        (sectionClick)="onMuteSectionClick($event)"
        (sectionDelete)="onMuteSectionDelete($event)"
        (sectionResizeStart)="onMuteSectionResizeStart($event)">
      </app-timeline-mute-layer>
    </div>
  }

  <!-- Waveform container - colored section blocks are overlaid on top -->
  <div class="track-waveform-container">
    <app-timeline-waveform
      [waveformData]="waveformData"
      [duration]="duration"
      [zoomState]="zoomState"
      [color]="waveformColor">
    </app-timeline-waveform>

    <!-- Sections overlaid over the waveform (semi-transparent so the wave shows through) -->
    <app-timeline-sections-layer
      class="sections-overlay"
      [sections]="sections"
      [duration]="duration"
      [zoomState]="zoomState"
      [selectedSection]="selectedSection"
      (sectionClick)="onSectionClick($event)"
      (sectionHover)="onSectionHover($event)">
    </app-timeline-sections-layer>

    <!-- Selection overlay - positioned within waveform container -->
    @if (selection) {
      <div class="selection-overlay"
           [style.left.%]="getSelectionLeft()"
           [style.width.%]="getSelectionWidth()">
        <div class="selection-handle left"
             (mousedown)="onSelectionHandleMouseDown($event, 'left')">
        </div>
        <div class="selection-drag-area"
             (mousedown)="onSelectionDragMouseDown($event)">
        </div>
        <div class="selection-handle right"
             (mousedown)="onSelectionHandleMouseDown($event, 'right')">
        </div>
      </div>
    }
  </div>
</div>
