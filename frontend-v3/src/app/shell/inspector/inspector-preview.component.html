@switch (mode()) {
  @case ('playing') {
    <video
      #video
      class="video"
      controls
      preload="metadata"
      [src]="streamUrl()"
      (error)="onError()"></video>
  }
  @default {
    <img class="poster" [src]="posterUrl()" alt="" />
    @if (mode() === 'error') {
      <div class="note" role="note">Can't preview this format</div>
    } @else {
      <button
        type="button"
        class="play"
        aria-label="Play preview"
        (click)="play()">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" focusable="false">
          <path d="M8 5v14l11-7z" fill="currentColor" />
        </svg>
      </button>
    }
  }
}
