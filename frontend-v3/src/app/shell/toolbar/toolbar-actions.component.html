<div class="toolbar-actions">
  <button
    type="button"
    class="action-btn primary"
    cdkOverlayOrigin
    #addTrigger="cdkOverlayOrigin"
    (click)="toggleAdd()"
    [attr.aria-expanded]="addOpen()"
    title="Add media — paste URLs or import files">
    <span class="btn-icon">＋</span> Add <span class="chevron">▾</span>
  </button>

  <span class="divider" aria-hidden="true"></span>

  <!-- Process: THE selection action — lights up when items are selected.
       Transcribe/Analyze live inside it as pipeline steps (preset chips give
       the one-click combos); the inspector keeps per-step Run actions. -->
  <button
    type="button"
    class="action-btn process"
    [class.lit]="hasSelection()"
    cdkOverlayOrigin
    #processTrigger="cdkOverlayOrigin"
    [disabled]="!hasSelection()"
    (click)="toggleProcess()"
    [attr.aria-expanded]="processOpen()"
    [title]="hasSelection() ? 'Run a pipeline of jobs on the selection' : 'Select items to process'">
    <span class="btn-icon">⚡</span> Process
    @if (selectionCount() > 0) {
      <span class="count-badge">{{ selectionCount() }}</span>
    }
    <span class="chevron">▾</span>
  </button>

  <button
    type="button"
    class="action-btn scout"
    [class.lit]="hasSelection()"
    [disabled]="!hasSelection()"
    (click)="openEditor.emit()"
    [title]="hasSelection() ? 'Open selected in Scout' : 'Select items to open in Scout'">
    <span class="btn-icon">▶</span> Scout
  </button>

  <button
    type="button"
    class="action-btn"
    [disabled]="!singleSelection()"
    (click)="viewInfo.emit()"
    [title]="singleSelection() ? 'View details' : 'Select exactly one item'">
    <span class="btn-icon">ⓘ</span> Info
  </button>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="processTrigger"
  [cdkConnectedOverlayOpen]="processOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayOffsetY]="8"
  (backdropClick)="closeProcess()"
  (detach)="closeProcess()">
  <app-process-popover
    [selectionCount]="selectionCount()"
    [withoutTranscript]="withoutTranscript()"
    [notAnalyzed]="notAnalyzed()"
    [aiReady]="aiReady()"
    [aiCheckFailed]="aiCheckFailed()"
    (submitSteps)="onSubmitProcess($event)"
    (setupAi)="onProcessSetupAi()"
    (retryAi)="retryAiCheck.emit()"
    (dismissed)="closeProcess()" />
</ng-template>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="addTrigger"
  [cdkConnectedOverlayOpen]="addOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayOffsetY]="8"
  (backdropClick)="closeAdd()"
  (detach)="closeAdd()">
  <app-add-popover
    [aiReady]="aiReady()"
    (submitAdd)="onSubmitAdd($event)"
    (importFiles)="onImportFiles()"
    (openAdvanced)="onOpenAdvanced()"
    (setupAi)="onSetupAi()"
    (dismissed)="closeAdd()" />
</ng-template>
