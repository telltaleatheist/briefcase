<div class="toolbar-actions">
  <button
    type="button"
    class="action-btn primary"
    cdkOverlayOrigin
    #addTrigger="cdkOverlayOrigin"
    (click)="toggleAdd()"
    [attr.aria-expanded]="addOpen()"
    title="Add media — paste URLs or import files">
    <span class="btn-icon">＋</span> Add <span class="chevron">▾</span>
  </button>

  <span class="divider" aria-hidden="true"></span>

  <!-- Process: THE selection action — lights up when items are selected.
       The pipeline composer now lives in the inspector; this button reveals
       and highlights it. -->
  <button
    type="button"
    class="action-btn process"
    [class.lit]="hasSelection()"
    [disabled]="!hasSelection()"
    (click)="revealProcess.emit()"
    [title]="hasSelection() ? 'Configure and run a pipeline on the selection' : 'Select items to process'">
    <span class="btn-icon">⚡</span> Process
    @if (selectionCount() > 0) {
      <span class="count-badge">{{ selectionCount() }}</span>
    }
  </button>

  <button
    type="button"
    class="action-btn scout"
    [class.lit]="hasSelection()"
    [disabled]="!hasSelection()"
    (click)="openEditor.emit()"
    [title]="hasSelection() ? 'Open selected in Scout' : 'Select items to open in Scout'">
    <span class="btn-icon">▶</span> Scout
  </button>

  <button
    type="button"
    class="action-btn"
    [disabled]="!singleSelection()"
    (click)="viewInfo.emit()"
    [title]="singleSelection() ? 'View details' : 'Select exactly one item'">
    <span class="btn-icon">ⓘ</span> Info
  </button>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="addTrigger"
  [cdkConnectedOverlayOpen]="addOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayOffsetY]="8"
  [cdkConnectedOverlayPush]="true"
  [cdkConnectedOverlayFlexibleDimensions]="true"
  [cdkConnectedOverlayGrowAfterOpen]="true"
  (backdropClick)="closeAdd()"
  (detach)="closeAdd()">
  <app-add-popover
    [aiReady]="aiReady()"
    [aiCheckFailed]="aiCheckFailed()"
    (submitAdd)="onSubmitAdd($event)"
    (importFiles)="onImportFiles()"
    (openAdvanced)="onOpenAdvanced()"
    (setupAi)="onSetupAi()"
    (retryAi)="onRetryAi()"
    (openComponents)="onOpenComponents()"
    (dismissed)="closeAdd()" />
</ng-template>
