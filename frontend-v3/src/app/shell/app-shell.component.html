<div
  class="shell"
  [class.chrome-hidden]="!nav.chromeVisible()"
  [style.--inspector-live-width.px]="nav.inspectorWidth()">
  @if (nav.chromeVisible()) {
    <app-toolbar
      class="region-toolbar"
      [title]="sectionTitle()"
      [hasTour]="hasTour()"
      [isDarkTheme]="isDarkTheme()"
      (toggleDrawer)="nav.toggleDrawer()"
      (toggleTheme)="onToggleTheme()"
      (startTour)="onStartTour()"
      (downloadLogs)="onDownloadLogs()">
      @if (onWorkspace()) {
        <app-toolbar-actions
          [hasSelection]="selection.hasSelection()"
          [singleSelection]="selection.count() === 1"
          [selectionCount]="selection.count()"
          [aiReady]="aiReady()"
          [withoutTranscript]="inspector.withoutTranscript()"
          [notAnalyzed]="inspector.notAnalyzed()"
          (submitAdd)="onSubmitAdd($event)"
          (importFiles)="dispatchToWorkspace({ type: 'import' })"
          (openAdvanced)="dispatchToWorkspace({ type: 'openDownloadDialog' })"
          (setupAi)="dispatchToWorkspace({ type: 'openAiSetup' })"
          (transcribe)="dispatchToWorkspace({ type: 'transcribeSelection' })"
          (analyze)="dispatchToWorkspace({ type: 'analyzeSelection' })"
          (openEditor)="dispatchToWorkspace({ type: 'openEditor' })"
          (viewInfo)="dispatchToWorkspace({ type: 'viewInfo' })"
          (processSteps)="dispatchToWorkspace({ type: 'processSelection', steps: $event })" />
      }
    </app-toolbar>

    <app-sidebar
      class="region-sidebar"
      [class.drawer-open]="nav.drawerOpen()"
      [activeSection]="nav.activeSection()"
      [activeCollectionId]="nav.activeCollectionId()"
      [collections]="collections()"
      [queueCount]="queueCount()"
      [currentLibraryName]="currentLibraryName()"
      (selectSection)="onSelectSection($event)"
      (selectCollection)="onSelectCollection($event)"
      (newCollection)="onNewCollection()"
      (openLibrarySwitcher)="onOpenLibrarySwitcher()" />

    @if (nav.drawerOpen()) {
      <div class="drawer-backdrop" (click)="nav.closeDrawer()" aria-hidden="true"></div>
    }
  }

  <main class="region-main">
    <router-outlet />
  </main>

  @if (nav.chromeVisible()) {
    <div class="region-inspector">
      <div
        class="inspector-resize-handle"
        appInspectorResize
        [currentWidth]="nav.inspectorWidth()"
        (widthChange)="nav.setInspectorWidth($event)"
        (resetWidth)="nav.resetInspectorWidth()"
        title="Drag to resize · double-click to reset"></div>
      <app-inspector-panel [aiReady]="aiReady()" [collections]="collections()" />
    </div>
  }
</div>
